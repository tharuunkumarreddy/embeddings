name: Regime R1 - Political Power_new
description: Multi-View VAE across 5 political sources (WGI, IMF_ArtIV, GDELT_govt, OECD_GOV, WITS_policy). embed_dim=32. REGIME_DIMS: [0, 32].
  
inputs:
  - name: regime_id
    type: String
    description: 'Regime identifier (r1..r9) used in metadata output'
    default: 'r1'
  - name: bundle
    type: Object
    description: 'Path to bundle.pkl from Preprocessor component'
  - name: c_m_path
    type: Object
    description: 'Path to c_m_bundle.parquet from C_m Loader (empty = no gating)'
    optional: true
  - name: countries
    type: String
    description: 'Comma-separated ISO3 country codes. Empty = auto-detect from bundle.'
    default: ''
  - name: year_start
    type: String
    description: 'Start year (inclusive)'
    default: '2010'
  - name: year_end
    type: String
    description: 'End year (inclusive)'
    default: '2025'

outputs:
  - name: embeddings
    type: Object
    description: 'Regime embeddings Parquet (country | year | isic_code | isic_level | dim_0..dim_31)'
  - name: meta
    type: Object
    description: 'Regime metadata JSON (embed_dim, regime_dims, output_shape, runtime_s)'

implementation:
  container:
    image: nikhilv215/nesy-factory:v23
    command:
      - python3
      - -u
      - -c
      - |
        import sys, os, json, argparse, logging, pickle, time, abc
        import numpy as np
        import pandas as pd
        import torch
        import torch.nn as nn
        import torch.nn.functional as F

        logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
        log = logging.getLogger("regime_r1")

        # -- Artifact path resolver (same as Preprocessor) -----------------------------

        def resolve_artifact_path(path: str) -> str:
            if not path:
                return path
            if os.path.isdir(path):
                for root, dirs, files in os.walk(path):
                    for fname in sorted(files):
                        resolved = os.path.join(root, fname)
                        log.info(f"Resolved artifact dir -> file: {resolved}")
                        return resolved
                raise FileNotFoundError(f"No file found inside artifact directory: {path}")
            return path

        # -- Inline BaseRegimeModel ----------------------------------------------------

        class BaseRegimeModel(abc.ABC):
            @property
            @abc.abstractmethod
            def regime_name(self) -> str: ...
            @property
            @abc.abstractmethod
            def embed_dim(self) -> int: ...
            @abc.abstractmethod
            def fit(self, data_dict: dict) -> None: ...
            @abc.abstractmethod
            def embed(self, data_dict: dict) -> torch.Tensor: ...

            @staticmethod
            def to_tensor(arr):
                return torch.from_numpy(np.nan_to_num(arr, nan=0.0, posinf=1.0, neginf=0.0)).float()

            @staticmethod
            def guard_output(t, name):
                if torch.isnan(t).any() or torch.isinf(t).any():
                    log.warning(f"{name}: NaN/Inf in output - replacing with 0")
                    t = torch.nan_to_num(t, nan=0.0, posinf=1.0, neginf=0.0)
                return t

        # -- R1 Model: Multi-View VAE --------------------------------------------------

        EMBED_DIM  = 32
        HIDDEN_DIM = 64
        N_EPOCHS   = 150
        LR         = 1e-3
        BETA       = 1.0

        SRC_DIMS = {
            "WGI":         6,   # VA, PV, GE, RQ, RL, CC
            "IMF_ArtIV":   8,   # gdp_bias, fiscal, debt, reform, credibility, sentiment, struct_reform, div_wgi
            "GDELT_govt":  6,   # event_count, tone, goldstein, actors, volatility, reform_signal
            "OECD_GOV":    4,   # reg_governance, effectiveness, anti_corruption, transparency
            "WITS_policy": 4,   # bound_tariff, applied_tariff, bound_applied_gap, pta_coverage
        }

        class SourceEncoder(nn.Module):
            def __init__(self, in_dim, hidden, latent):
                super().__init__()
                self.net = nn.Sequential(
                    nn.Linear(in_dim, hidden), nn.LayerNorm(hidden), nn.GELU(),
                    nn.Linear(hidden, hidden), nn.GELU(),
                )
                self.fc_mu     = nn.Linear(hidden, latent)
                self.fc_logvar = nn.Linear(hidden, latent)

            def forward(self, x):
                h = self.net(x)
                return self.fc_mu(h), self.fc_logvar(h)

        class SharedDecoder(nn.Module):
            def __init__(self, latent, hidden, out_dim):
                super().__init__()
                self.net = nn.Sequential(
                    nn.Linear(latent, hidden), nn.GELU(),
                    nn.Linear(hidden, out_dim), nn.Sigmoid(),
                )

            def forward(self, z):
                return self.net(z)

        class MultiViewVAE(nn.Module):
            def __init__(self, src_dims, hidden, latent):
                super().__init__()
                self.src_names = list(src_dims.keys())
                self.encoders  = nn.ModuleDict({
                    n: SourceEncoder(d, hidden, latent) for n, d in src_dims.items()
                })
                self.decoders  = nn.ModuleDict({
                    n: SharedDecoder(latent, hidden, d) for n, d in src_dims.items()
                })

            def product_of_gaussians(self, mus, logvars):
                precs      = [(-lv).exp() for lv in logvars]
                total_prec = sum(precs) + 1e-8
                jv         = 1.0 / total_prec
                return sum(mu * p for mu, p in zip(mus, precs)) * jv, jv.log()

            def reparameterise(self, mu, logvar):
                if self.training:
                    return mu + torch.randn_like(mu) * (0.5 * logvar).exp()
                return mu

            def forward(self, views):
                mus, lvs = [], []
                for n in self.src_names:
                    mu, lv = self.encoders[n](views[n])
                    mus.append(mu); lvs.append(lv)
                jmu, jlv = self.product_of_gaussians(mus, lvs)
                z = self.reparameterise(jmu, jlv)
                recons = {n: self.decoders[n](z) for n in self.src_names}
                return z, jmu, jlv, recons

            def elbo_loss(self, views, recons, mu, logvar, beta=1.0):
                recon = sum(F.mse_loss(recons[n], views[n]) for n in self.src_names)
                kl    = -0.5 * (1 + logvar - mu.pow(2) - logvar.exp()).sum(-1).mean()
                return recon + beta * kl

        class PoliticalPowerRegime(BaseRegimeModel):
            

            @property
            def regime_name(self): return "Political Power"
            @property
            def embed_dim(self): return EMBED_DIM

            def __init__(self):
                self.model = None

            def _views(self, d):
                return {
                    "WGI":         self.to_tensor(d["WGI"]),
                    "IMF_ArtIV":   self.to_tensor(d["IMF_ArtIV"]),
                    "GDELT_govt":  self.to_tensor(d["GDELT_govt"]),
                    "OECD_GOV":    self.to_tensor(d["OECD_GOV"]),
                    "WITS_policy": self.to_tensor(d["WITS_policy"]),
                }

            def fit(self, data_dict):
                self.model = MultiViewVAE(SRC_DIMS, HIDDEN_DIM, EMBED_DIM)
                opt = torch.optim.Adam(self.model.parameters(), lr=LR)
                views = self._views(data_dict)
                self.model.train()
                for _ in range(N_EPOCHS):
                    opt.zero_grad()
                    _, mu, lv, recons = self.model(views)
                    self.model.elbo_loss(views, recons, mu, lv, BETA).backward()
                    nn.utils.clip_grad_norm_(self.model.parameters(), 1.0)
                    opt.step()
                self.model.eval()

            def embed(self, data_dict):
                if self.model is None:
                    self.fit(data_dict)
                with torch.no_grad():
                    _, mu, _, _ = self.model(self._views(data_dict))
                return self.guard_output(mu, self.regime_name)

        # -- Runner utilities (inlined) ------------------------------------------------

        def get_country_ids_from_bundle(data_dict):
            if "__countries__" in data_dict:
                return data_dict["__countries__"]
            for val in data_dict.values():
                if isinstance(val, np.ndarray) and val.ndim >= 1:
                    return [f"country_{i}" for i in range(val.shape[0])]
            return []

        def apply_cm_gating(emb_np, c_m_df):
            if c_m_df.empty:
                return pd.DataFrame()
            base    = emb_np[0]   # (embed_dim,)
            gates   = c_m_df["c_m_gate"].values.astype(np.float32)      if "c_m_gate"      in c_m_df.columns else np.full(len(c_m_df), 0.5, dtype=np.float32)
            weights = c_m_df["sector_weight"].values.astype(np.float32) if "sector_weight" in c_m_df.columns else np.ones(len(c_m_df),       dtype=np.float32)
            # (num_isic, embed_dim) - vectorised, no iterrows
            gated  = base[None, :] * (gates * weights)[:, None]
            result = pd.DataFrame(gated, columns=[f"dim_{i}" for i in range(len(base))])
            result.insert(0, "isic_code",  c_m_df["isic_code"].values  if "isic_code"  in c_m_df.columns else "")
            result.insert(1, "isic_level", c_m_df["isic_level"].values if "isic_level" in c_m_df.columns else "")
            return result

        def run_for_bundle(data_dict, model, c_m_df, countries, years):
            all_rows = []
            N = len(countries)
            log.info(f"  Fitting model: {model.regime_name}")
            model.fit(data_dict)
            base_np = model.embed(data_dict).detach().numpy()
            log.info(f"  Base embedding: {base_np.shape}")

            for ci, country in enumerate(countries):
                emb_c   = base_np[[ci]]
                c_m_c   = c_m_df[c_m_df["country"] == country] if "country" in c_m_df.columns else c_m_df
                for year in years:
                    c_m_yr = (c_m_c[c_m_c["year"] == year]
                              if "year" in c_m_df.columns and not c_m_c.empty else c_m_c)
                    if c_m_yr.empty:
                        all_rows.append({"country": country, "year": year,
                                         "isic_code": "ALL", "isic_level": "ALL",
                                         **{f"dim_{i}": float(emb_c[0, i])
                                            for i in range(emb_c.shape[1])}})
                        continue
                    gdf = apply_cm_gating(emb_c, c_m_yr)
                    if gdf.empty:
                        continue
                    gdf.insert(0, "year", year)
                    gdf.insert(0, "country", country)
                    all_rows.extend(gdf.to_dict("records"))
                if (ci + 1) % 20 == 0:
                    log.info(f"  {ci+1}/{N} countries ...")
            return pd.DataFrame(all_rows)

        # -- Main ---------------------------------------------------------------------

        def main():
            ap = argparse.ArgumentParser(description="Component: Regime Runner")
            ap.add_argument("--regime_id",  default="r1", help="Regime identifier")
            ap.add_argument("--bundle",     required=True)
            ap.add_argument("--c_m_path",   default="")
            ap.add_argument("--output",     required=True)
            ap.add_argument("--meta_path",  default="")
            ap.add_argument("--countries",  default="")
            ap.add_argument("--year_start", type=int, default=2010)
            ap.add_argument("--year_end",   type=int, default=2025)
            args = ap.parse_args()

            log.info("=" * 60)
            log.info(f"  Regime Runner  |  regime={args.regime_id}  (Political Power)")
            log.info("=" * 60)

            # Resolve artifact directory paths to actual files
            bundle_path = resolve_artifact_path(args.bundle)
            with open(bundle_path, "rb") as f:
                data_dict = pickle.load(f)

            countries = ([c.strip() for c in args.countries.split(",")]
                         if args.countries else get_country_ids_from_bundle(data_dict))
            years = list(range(args.year_start, args.year_end + 1))

            c_m_df = pd.DataFrame()
            if args.c_m_path:
                cm_resolved = resolve_artifact_path(args.c_m_path)
                if cm_resolved and os.path.exists(cm_resolved):
                    c_m_df = pd.read_parquet(cm_resolved)
                    log.info(f"C_m loaded: {c_m_df.shape}")

            model = PoliticalPowerRegime()
            log.info(f"Running {model.regime_name}  embed_dim={model.embed_dim}  "
                     f"N={len(countries)}  T={len(years)}")

            t0 = time.time()
            result_df = run_for_bundle(data_dict, model, c_m_df, countries, years)
            elapsed = time.time() - t0

            os.makedirs(os.path.dirname(args.output) or ".", exist_ok=True)
            result_df.to_parquet(args.output, index=False, engine="pyarrow", compression="snappy")
            log.info(f"Saved -> {args.output}  shape={result_df.shape}  ({elapsed:.1f}s)")

            if args.meta_path:
                os.makedirs(os.path.dirname(args.meta_path) or ".", exist_ok=True)
                with open(args.meta_path, "w") as f:
                    json.dump({"regime_id": args.regime_id, "regime_name": model.regime_name,
                               "embed_dim": model.embed_dim, "regime_dims": [0, 32],
                               "output_shape": list(result_df.shape),
                               "runtime_s": round(elapsed, 2)}, f, indent=2)

        if __name__ == "__main__":
            main()
    args:
      - --regime_id
      - {inputValue: regime_id}
      - --bundle
      - {inputPath: bundle}
      - --c_m_path
      - {inputPath: c_m_path}
      - --countries
      - {inputValue: countries}
      - --year_start
      - {inputValue: year_start}
      - --year_end
      - {inputValue: year_end}
      - --output
      - {outputPath: embeddings}
      - --meta_path
      - {outputPath: meta}
