name: Source - World Bank
description: >
  Independent Elyra/Kubeflow component. Three modes:
  1. minio     : downloads worldbank_final_output.json from MinIO -> parquet
  2. pi_api    : fetches all data from PI API endpoint            -> parquet
  3. synthetic : generates synthetic World Bank data              -> parquet

inputs:
  - name: mode
    type: String
    description: 'Data fetch mode: "minio", "pi_api", or "synthetic"'
    default: 'minio'
  - name: countries
    type: String
    description: 'Comma-separated ISO3 country codes. Empty = all available.'
    default: ''
  - name: year_start
    type: String
    description: 'Start year (inclusive)'
  - name: year_end
    type: String
    description: 'End year (inclusive)'
  - name: minio_endpoint
    type: String
    description: 'MinIO endpoint URL'
    default: 'https://s3.us-west-004.backblazeb2.com'
  - name: minio_access_key
    type: String
    description: 'MinIO access key'
    default: ''
  - name: minio_secret_key
    type: String
    description: 'MinIO secret key'
    default: ''
  - name: bucket
    type: String
    description: 'MinIO bucket name'
    default: 'holacracydata'
  - name: prefix
    type: String
    description: 'MinIO object prefix / sub-folder'
    default: 'connector_output'
  - name: minio_filename
    type: String
    description: 'Object filename inside the MinIO bucket/prefix (e.g. worldbank_final_output.json)'
    default: 'worldbank_final_output.json'
  - name: pi_api_url
    type: String
    description: 'PI API base URL'
    default: ''
  - name: pi_access_token
    type: String
    description: 'Bearer token for PI API'
    default: ''
  - name: pi_page_size
    type: String
    description: 'Records per page for PI API pagination'
    default: '2000'

outputs:
  - name: output_data
    type: Data
    description: 'Source data in Parquet format'
  - name: meta
    type: Data
    description: 'Fetch metadata JSON'

implementation:
  container:
    image: nikhilv215/nesy-factory:v23
    command:
      - python3
      - -u
      - -c
      - |

        import os, json, argparse, logging, time
        import numpy as np
        import pandas as pd

        logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
        log = logging.getLogger("source_worldbank")

        DEFAULT_SYNTHETIC_COUNTRIES = [
            "USA","GBR","DEU","FRA","JPN","CHN","IND","BRA","CAN","AUS",
            "KOR","MEX","IDN","TUR","SAU","ZAF","ARG","NGA","EGY","PAK",
            "NLD","CHE","SWE","NOR","POL","THA","MYS","PHL","VNM","BGD",
        ]

        # -- Helpers --------------------------------------------------------------------

        def _make_s3_client(endpoint, access_key, secret_key):
            import boto3
            from botocore.config import Config as BotoConfig
            return boto3.client(
                "s3",
                endpoint_url=endpoint,
                aws_access_key_id=access_key,
                aws_secret_access_key=secret_key,
                config=BotoConfig(
                    signature_version="s3v4",
                    retries={"max_attempts": 5, "mode": "adaptive"},
                ),
            )

        def _read_raw(local_path: str, filename: str) -> pd.DataFrame:
    Download worldbank_final_output.json from MinIO -> save as parquet.Generate synthetic World Bank data (WGI, WDI, B_READY columns).
            rows = []
            for iso in countries:
                for yr in range(year_start, year_end + 1):
                    rows.append({
                        "iso3": iso, "year": yr,
                        "voice_accountability":       float(np.random.uniform(-2.5, 2.5)),
                        "political_stability":        float(np.random.uniform(-2.5, 2.5)),
                        "government_effectiveness":   float(np.random.uniform(-2.5, 2.5)),
                        "regulatory_quality":         float(np.random.uniform(-2.5, 2.5)),
                        "rule_of_law":                float(np.random.uniform(-2.5, 2.5)),
                        "control_corruption":         float(np.random.uniform(-2.5, 2.5)),
                        "gdp_per_capita":             float(np.random.uniform(1000, 80000)),
                        "inflation":                  float(np.random.uniform(0, 15)),
                        "fdi_inflows_pct_gdp":        float(np.random.uniform(0, 10)),
                        "exports_pct_gdp":            float(np.random.uniform(10, 80)),
                        "gini_coefficient":           float(np.random.uniform(25, 60)),
                        "unemployment_rate":          float(np.random.uniform(2, 20)),
                        "internet_penetration":       float(np.random.uniform(30, 98)),
                        "regulatory_framework_score": float(np.random.uniform(40, 90)),
                        "public_services_score":      float(np.random.uniform(40, 90)),
                        "operational_efficiency":     float(np.random.uniform(40, 90)),
                        "pillar_business_entry":      float(np.random.uniform(40, 90)),
                        "pillar_labor":               float(np.random.uniform(40, 90)),
                    })
            return pd.DataFrame(rows)

        # -- Main -----------------------------------------------------------------------

        def main():
            ap = argparse.ArgumentParser(description="Source component: World Bank")
            ap.add_argument("--mode",             choices=["minio", "pi_api", "synthetic"], default="minio")
            ap.add_argument("--countries",        default="", help="Comma-sep ISO3 codes (optional)")
            ap.add_argument("--year_start",       type=int, required=True)
            ap.add_argument("--year_end",         type=int, required=True)
            ap.add_argument("--output_path",      required=True, help="Output .parquet path")
            ap.add_argument("--minio_endpoint",   default="")
            ap.add_argument("--minio_access_key", default="")
            ap.add_argument("--minio_secret_key", default="")
            ap.add_argument("--bucket",           default="")
            ap.add_argument("--prefix",           default="")
            ap.add_argument("--minio_filename",   default="")
            ap.add_argument("--pi_api_url",       default="")
            ap.add_argument("--pi_access_token",  default="")
            ap.add_argument("--pi_page_size",     type=int, default=2000)
            ap.add_argument("--meta_path",        default="")
            args = ap.parse_args()

            log.info("=" * 60)
            log.info("  SOURCE: World Bank")
            log.info(f"  mode={args.mode}")
            log.info("=" * 60)

            if args.mode == "synthetic":
                countries = [c.strip() for c in args.countries.split(",")] if args.countries else DEFAULT_SYNTHETIC_COUNTRIES
                df = generate_synthetic(countries, args.year_start, args.year_end)
                _save_parquet(df, args.output_path)
                log.info(f"Synthetic worldbank -> {args.output_path}  shape={df.shape}")
            elif args.mode == "pi_api":
                df = fetch_from_pi_api(args.pi_api_url, args.pi_access_token, args.pi_page_size)
                _save_parquet(df, args.output_path)
                if args.meta_path:
                    meta = {"source": "worldbank", "mode": "pi_api",
                            "rows": len(df), "columns": list(df.columns), "output_path": args.output_path}
                    os.makedirs(os.path.dirname(args.meta_path) or ".", exist_ok=True)
                    with open(args.meta_path, "w") as f:
                        json.dump(meta, f, indent=2)
            else:  # minio
                download_from_minio(
                    args.minio_endpoint, args.minio_access_key, args.minio_secret_key,
                    args.bucket, args.prefix, args.minio_filename, args.output_path, args.meta_path,
                )

        if __name__ == "__main__":
            main()
    args:
      - --mode
      - {inputValue: mode}
      - --countries
      - {inputValue: countries}
      - --year_start
      - {inputValue: year_start}
      - --year_end
      - {inputValue: year_end}
      - --minio_endpoint
      - {inputValue: minio_endpoint}
      - --minio_access_key
      - {inputValue: minio_access_key}
      - --minio_secret_key
      - {inputValue: minio_secret_key}
      - --bucket
      - {inputValue: bucket}
      - --prefix
      - {inputValue: prefix}
      - --minio_filename
      - {inputValue: minio_filename}
      - --pi_api_url
      - {inputValue: pi_api_url}
      - --pi_access_token
      - {inputValue: pi_access_token}
      - --pi_page_size
      - {inputValue: pi_page_size}
      - --output_path
      - {outputPath: output_data}
      - --meta_path
      - {outputPath: meta}
