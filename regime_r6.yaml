name: Regime R6 - Operational Reality new
description: 'SVD-initialised factor model on ILOSTAT / UNIDO-IPI / GDELT. embed_dim=32. REGIME_DIMS [160, 192].'

inputs:
  - name: regime_id
    type: String
    description: 'Regime identifier (r1..r9) used in metadata output'
    default: 'r6'
  - name: bundle
    type: Object
    description: 'Path to bundle.pkl from Preprocessor component'
  - name: c_m_path
    type: Object
    description: 'Path to c_m_bundle.parquet from C_m Loader (empty = no gating)'
    optional: true
  - name: countries
    type: String
    description: 'Comma-separated ISO3 country codes. Empty = auto-detect from bundle.'
    default: ''
  - name: year_start
    type: String
    description: 'Start year (inclusive)'
    default: '2010'
  - name: year_end
    type: String
    description: 'End year (inclusive)'
    default: '2025'

outputs:
  - name: embeddings
    type: Object
    description: 'Regime embeddings Parquet (country | year | isic_code | isic_level | dim_0..dim_31)'
  - name: meta
    type: Object
    description: 'Regime metadata JSON'

implementation:
  container:
    image: nikhilv215/nesy-factory:v23
    command:
      - python3
      - -u
      - -c
      - |
        import os, json, argparse, logging, pickle, time, abc
        import numpy as np
        import pandas as pd
        import torch
        import torch.nn as nn

        logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
        log = logging.getLogger("regime_r6")

        def resolve_artifact_path(path: str) -> str:
            if not path:
                return path
            if os.path.isdir(path):
                for root, dirs, files in os.walk(path):
                    for fname in sorted(files):
                        resolved = os.path.join(root, fname)
                        log.info(f"Resolved artifact dir -> file: {resolved}")
                        return resolved
                raise FileNotFoundError(f"No file found inside artifact directory: {path}")
            return path

        class BaseRegimeModel(abc.ABC):
            @property
            @abc.abstractmethod
            def regime_name(self) -> str: ...
            @property
            @abc.abstractmethod
            def embed_dim(self) -> int: ...
            @abc.abstractmethod
            def fit(self, data_dict: dict) -> None: ...
            @abc.abstractmethod
            def embed(self, data_dict: dict) -> torch.Tensor: ...
            @staticmethod
            def to_tensor(arr):
                return torch.from_numpy(np.nan_to_num(arr, nan=0.0, posinf=1.0, neginf=0.0)).float()
            @staticmethod
            def guard_output(t, name):
                if torch.isnan(t).any() or torch.isinf(t).any():
                    log.warning(f"{name}: NaN/Inf in output - replacing with 0")
                    t = torch.nan_to_num(t, nan=0.0, posinf=1.0, neginf=0.0)
                return t

        EMBED_DIM  = 32
        N_FACTORS  = 8
        HIDDEN_DIM = 48
        N_EPOCHS   = 200
        LR         = 1e-3
        # ILOSTAT(5) + IPI_collapsed(3) + GDELT_density(3) = 11
        TOTAL_DIM = 11

        class OperationalFactorModel(nn.Module):
            # Regime 6 - Operational Reality, embed_dim=32, operational [160,192]
            def __init__(self, in_dim, n_factors, hidden, embed_dim):
                super().__init__()
                self.market_factors = nn.Parameter(torch.randn(1, n_factors) * 0.01)
                self.item_factors   = nn.Parameter(torch.randn(in_dim, n_factors) * 0.01)
                self.projector = nn.Sequential(
                    nn.Linear(n_factors, hidden), nn.GELU(),
                    nn.Linear(hidden, embed_dim), nn.Tanh(),
                )
                self.decoder = nn.Sequential(
                    nn.Linear(n_factors, hidden), nn.GELU(),
                    nn.Linear(hidden, in_dim), nn.Sigmoid(),
                )
            def svd_init(self, x_np):
                U, S, Vt = np.linalg.svd(x_np, full_matrices=False)
                k = min(self.market_factors.shape[1], U.shape[1])
                with torch.no_grad():
                    self.market_factors.data = torch.from_numpy(
                        (U[:, :k] * S[:k]).astype(np.float32)
                    )
                    self.item_factors.data = torch.from_numpy(
                        Vt[:k, :].T.astype(np.float32)
                    )
            def forward(self, x):
                factors = x @ self.item_factors
                emb   = self.projector(factors)
                recon = self.decoder(factors)
                return emb, factors, recon

        class OperationalRealityRegime(BaseRegimeModel):
            @property
            def regime_name(self): return "Operational Reality"
            @property
            def embed_dim(self): return EMBED_DIM
            def __init__(self):
                self.model = None
            def _stack(self, data_dict):
                ilostat      = data_dict["ILOSTAT"]
                unido_ipi_ts = data_dict["UNIDO_IPI"]
                gdelt_den    = data_dict["GDELT_density"]
                ipi_mean  = unido_ipi_ts.mean(axis=1, keepdims=True)
                ipi_std   = unido_ipi_ts.std(axis=1, keepdims=True) + 1e-6
                T = unido_ipi_ts.shape[1]
                x_idx = np.linspace(-1, 1, T)
                ipi_trend = np.array([
                    np.polyfit(x_idx, unido_ipi_ts[i], 1)[0]
                    for i in range(unido_ipi_ts.shape[0])
                ], dtype=np.float32).reshape(-1, 1)
                ipi_collapsed = np.concatenate([ipi_mean, ipi_std, ipi_trend], axis=1)
                concat_np = np.concatenate([ilostat, ipi_collapsed, gdelt_den], axis=1).astype(np.float32)
                return torch.from_numpy(concat_np), concat_np
            def fit(self, data_dict):
                x, x_np = self._stack(data_dict)
                self.model = OperationalFactorModel(TOTAL_DIM, N_FACTORS, HIDDEN_DIM, EMBED_DIM)
                self.model.svd_init(x_np)
                opt = torch.optim.Adam(self.model.parameters(), lr=LR)
                self.model.train()
                for _ in range(N_EPOCHS):
                    opt.zero_grad()
                    emb, factors, recon = self.model(x)
                    recon_loss = nn.functional.mse_loss(recon, x)
                    F_mat  = factors - factors.mean(0)
                    cov    = F_mat.T @ F_mat / (F_mat.shape[0] - 1 + 1e-8)
                    off_d  = cov - torch.diag(cov.diag())
                    decorr = off_d.pow(2).mean()
                    (recon_loss + 1e-3 * decorr).backward()
                    nn.utils.clip_grad_norm_(self.model.parameters(), 1.0)
                    opt.step()
                self.model.eval()
            def embed(self, data_dict):
                if self.model is None:
                    self.fit(data_dict)
                x, _ = self._stack(data_dict)
                with torch.no_grad():
                    emb, _, _ = self.model(x)
                return self.guard_output(emb, self.regime_name)

        def get_country_ids_from_bundle(data_dict):
            if "__countries__" in data_dict:
                return data_dict["__countries__"]
            for val in data_dict.values():
                if isinstance(val, np.ndarray) and val.ndim >= 1:
                    return [f"country_{i}" for i in range(val.shape[0])]
            return []

        def apply_cm_gating(emb_np, c_m_df):
            if c_m_df.empty:
                return pd.DataFrame()
            base    = emb_np[0]
            gates   = c_m_df["c_m_gate"].values.astype(np.float32)      if "c_m_gate"      in c_m_df.columns else np.full(len(c_m_df), 0.5, dtype=np.float32)
            weights = c_m_df["sector_weight"].values.astype(np.float32) if "sector_weight" in c_m_df.columns else np.ones(len(c_m_df),       dtype=np.float32)
            gated  = base[None, :] * (gates * weights)[:, None]
            result = pd.DataFrame(gated, columns=[f"dim_{i}" for i in range(len(base))])
            result.insert(0, "isic_code",  c_m_df["isic_code"].values  if "isic_code"  in c_m_df.columns else "")
            result.insert(1, "isic_level", c_m_df["isic_level"].values if "isic_level" in c_m_df.columns else "")
            return result

        def run_for_bundle(data_dict, model, c_m_df, countries, years, output_path):
            import pyarrow as pa
            import pyarrow.parquet as pq
            N = len(countries)
            embed_dim = model.embed_dim
            log.info(f"  Fitting model: {model.regime_name}")
            model.fit(data_dict)
            base_np = model.embed(data_dict).detach().numpy()
            log.info(f"  Base embedding: {base_np.shape}")
            os.makedirs(os.path.dirname(output_path) or ".", exist_ok=True)
            writer = None
            total_rows = 0
            chunk_buf = []
            FLUSH_EVERY = 20
            dim_cols = [f"dim_{i}" for i in range(embed_dim)]
            for ci, country in enumerate(countries):
                emb_c = base_np[[ci]]
                c_m_c = c_m_df[c_m_df["country"] == country] if "country" in c_m_df.columns else c_m_df
                for year in years:
                    c_m_yr = (c_m_c[c_m_c["year"] == year]
                              if "year" in c_m_df.columns and not c_m_c.empty else c_m_c)
                    if c_m_yr.empty:
                        row = {"country": country, "year": year, "isic_code": "ALL", "isic_level": "ALL"}
                        for i in range(embed_dim):
                            row[dim_cols[i]] = float(emb_c[0, i])
                        chunk_buf.append(row)
                        continue
                    gdf = apply_cm_gating(emb_c, c_m_yr)
                    if gdf.empty:
                        continue
                    gdf.insert(0, "year", year)
                    gdf.insert(0, "country", country)
                    chunk_buf.extend(gdf.to_dict("records"))
                if (ci + 1) % FLUSH_EVERY == 0 and chunk_buf:
                    chunk_df = pd.DataFrame(chunk_buf)
                    table = pa.Table.from_pandas(chunk_df, preserve_index=False)
                    if writer is None:
                        writer = pq.ParquetWriter(output_path, table.schema, compression="snappy")
                    writer.write_table(table)
                    total_rows += len(chunk_df)
                    log.info(f"  {ci+1}/{N} countries ... flushed {total_rows} rows")
                    chunk_buf = []
            if chunk_buf:
                chunk_df = pd.DataFrame(chunk_buf)
                table = pa.Table.from_pandas(chunk_df, preserve_index=False)
                if writer is None:
                    writer = pq.ParquetWriter(output_path, table.schema, compression="snappy")
                writer.write_table(table)
                total_rows += len(chunk_df)
            if writer:
                writer.close()
            log.info(f"  Streaming complete: {total_rows} total rows")
            return total_rows

        def main():
            ap = argparse.ArgumentParser(description="Component: Regime Runner")
            ap.add_argument("--regime_id",  default="r6")
            ap.add_argument("--bundle",     required=True)
            ap.add_argument("--c_m_path",   default="")
            ap.add_argument("--output",     required=True)
            ap.add_argument("--meta_path",  default="")
            ap.add_argument("--countries",  default="")
            ap.add_argument("--year_start", type=int, default=2010)
            ap.add_argument("--year_end",   type=int, default=2025)
            args = ap.parse_args()
            log.info("=" * 60)
            log.info(f"  Regime Runner  |  regime={args.regime_id}  (Operational Reality)")
            log.info("=" * 60)
            bundle_path = resolve_artifact_path(args.bundle)
            with open(bundle_path, "rb") as f:
                data_dict = pickle.load(f)
            countries = ([c.strip() for c in args.countries.split(",")]
                         if args.countries else get_country_ids_from_bundle(data_dict))
            years = list(range(args.year_start, args.year_end + 1))
            c_m_df = pd.DataFrame()
            if args.c_m_path:
                cm_resolved = resolve_artifact_path(args.c_m_path)
                if cm_resolved and os.path.exists(cm_resolved):
                    c_m_df = pd.read_parquet(cm_resolved)
                    log.info(f"C_m loaded: {c_m_df.shape}")
            model = OperationalRealityRegime()
            log.info(f"Running {model.regime_name}  embed_dim={model.embed_dim}  "
                     f"N={len(countries)}  T={len(years)}")
            t0 = time.time()
            total_rows = run_for_bundle(data_dict, model, c_m_df, countries, years, args.output)
            elapsed = time.time() - t0
            log.info(f"Saved -> {args.output}  rows={total_rows}  ({elapsed:.1f}s)")
            if args.meta_path:
                os.makedirs(os.path.dirname(args.meta_path) or ".", exist_ok=True)
                with open(args.meta_path, "w") as f:
                    json.dump({"regime_id": args.regime_id, "regime_name": model.regime_name,
                               "embed_dim": model.embed_dim, "regime_dims": [160, 192],
                               "output_rows": total_rows,
                               "runtime_s": round(elapsed, 2)}, f, indent=2)

        if __name__ == "__main__":
            main()
    args:
      - --regime_id
      - {inputValue: regime_id}
      - --bundle
      - {inputPath: bundle}
      - --c_m_path
      - {inputPath: c_m_path}
      - --countries
      - {inputValue: countries}
      - --year_start
      - {inputValue: year_start}
      - --year_end
      - {inputValue: year_end}
      - --output
      - {outputPath: embeddings}
      - --meta_path
      - {outputPath: meta}
