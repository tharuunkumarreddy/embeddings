name: D_m - Dynamics Mapper
description: 'Derive dynamic/volatility embeddings (D_m) from the preprocessed bundle.'

inputs:
  - name: bundle
    type: Object
    description: 'Path to bundle.pkl from Preprocessor'
  - name: countries
    type: String
    description: 'Comma-separated ISO3 country codes'
    default: ''
  - name: year_start
    type: String
    description: 'Start year (inclusive)'
    default: '2010'
  - name: year_end
    type: String
    description: 'End year (inclusive)'
    default: '2025'

outputs:
  - name: d_m_data
    type: Object
    description: 'Dynamics embeddings Parquet (country | year | dyn_0..dyn_2)'

implementation:
  container:
    image: nikhilv215/nesy-factory:v23
    command:
      - python3
      - -u
      - -c
      - |
        import os, argparse, logging, pickle
        import numpy as np
        import pandas as pd
        import torch

        logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
        log = logging.getLogger("d_m")

        def resolve_artifact_path(path: str) -> str:
            if not path:
                return path
            if os.path.isdir(path):
                for root, dirs, files in os.walk(path):
                    for fname in sorted(files):
                        resolved = os.path.join(root, fname)
                        log.info(f"Resolved artifact dir -> file: {resolved}")
                        return resolved
                raise FileNotFoundError(f"No file found inside artifact directory: {path}")
            return path

        def kalman_velocity(series: np.ndarray, Q: float = 0.1, R: float = 1.0) -> float:
            # Simple 1D Kalman filter to estimate velocity (rate of change)
            if len(series) < 2:
                return 0.0
            x = 0.0   # state estimate
            P = 1.0   # estimate covariance
            for z in series:
                # Predict
                x_pred = x
                P_pred = P + Q
                # Update
                K = P_pred / (P_pred + R + 1e-12)
                x = x_pred + K * (z - x_pred)
                P = (1 - K) * P_pred
            # Velocity = final state deviation from mean
            return float(np.tanh(x - np.mean(series)))

        def half_life_inertia(series: np.ndarray) -> float:
            # Exponential decay half-life of autocorrelation, clipped [0,1]
            if len(series) < 3:
                return 0.5
            s = series - series.mean()
            var = np.var(s) + 1e-12
            autocorr = np.correlate(s, s, mode='full')
            autocorr = autocorr[len(autocorr) // 2:]
            autocorr = autocorr / (var * len(s) + 1e-12)
            # Find first lag where autocorrelation drops below 0.5
            half_life = len(autocorr)
            for i in range(1, len(autocorr)):
                if autocorr[i] < 0.5:
                    half_life = i
                    break
            return float(np.clip(half_life / len(series), 0.0, 1.0))

        def hurst_persistence(series: np.ndarray) -> float:
            # Simplified R/S Hurst exponent estimation
            if len(series) < 4:
                return 0.5
            s = series - series.mean()
            cumdev = np.cumsum(s)
            R = cumdev.max() - cumdev.min()
            S = np.std(series) + 1e-12
            n = len(series)
            if R <= 0 or S <= 0:
                return 0.5
            H = np.log(R / S + 1e-12) / (np.log(n) + 1e-12)
            return float(np.clip(H, 0.0, 1.0))

        class DynamicsEstimator:
            # Computes v_m (velocity), iota_m (inertia), rho_m (persistence)
            def compute(self, data_dict):
                N = data_dict["WEO"].shape[0]
                # Velocity (WEO GDP growth deviation)
                weo = data_dict["WEO"]  # (N, 6)
                v_m = np.tanh((weo[:, 0] - weo[:, 0].mean()).astype(np.float32))
                # Inertia (BIS credit-gap + informality blend)
                bis_credit  = data_dict["BIS_credit"][:, 0]
                informality = data_dict["ILOSTAT"][:, 0]
                i_m = np.array([
                    half_life_inertia(np.array([float(bis_credit[n])] * 5))
                    for n in range(N)
                ], dtype=np.float32)
                i_m = np.clip(0.6 * i_m + 0.4 * informality.astype(np.float32), 0.0, 1.0)
                # Persistence (Hurst on FDI + wages)
                fdi   = data_dict["UNCTAD_FDI"][:, 0]
                wages = data_dict["ILOSTAT_wages"][:, 0]
                combined   = np.stack([fdi, wages], axis=1).mean(axis=1)
                rho_global = hurst_persistence(combined)
                rho_m = np.clip(
                    rho_global + (fdi - fdi.mean()) * 0.1, 0.0, 1.0
                ).astype(np.float32)
                D_m = np.stack([v_m, i_m, rho_m], axis=1)
                return torch.from_numpy(D_m)

        def get_country_ids_from_bundle(data_dict):
            if "__countries__" in data_dict:
                return data_dict["__countries__"]
            for val in data_dict.values():
                if isinstance(val, np.ndarray) and val.ndim >= 1:
                    return [f"country_{i}" for i in range(val.shape[0])]
            return []

        def tensor_to_df(tensor, countries, col_prefix, years):
            arr  = tensor.detach().numpy()
            K    = arr.shape[1]
            cols = [f"{col_prefix}_{i}" for i in range(K)]
            rows = []
            for ci, country in enumerate(countries):
                for yr in years:
                    row = {"country": country, "year": yr}
                    row.update({cols[k]: float(arr[ci, k]) for k in range(K)})
                    rows.append(row)
            return pd.DataFrame(rows)

        def main():
            ap = argparse.ArgumentParser(description="Component: Supplementary D_m")
            ap.add_argument("--bundle",     required=True)
            ap.add_argument("--countries",  default="")
            ap.add_argument("--year_start", type=int, default=2010)
            ap.add_argument("--year_end",   type=int, default=2025)
            ap.add_argument("--output",     required=True)
            args = ap.parse_args()
            log.info("=" * 60)
            log.info("  Supplementary: D_m  (Market Dynamics)")
            log.info("=" * 60)
            bundle_path = resolve_artifact_path(args.bundle)
            with open(bundle_path, "rb") as f:
                data_dict = pickle.load(f)
            log.info(f"Bundle loaded: {len(data_dict)} keys")
            countries = ([c.strip() for c in args.countries.split(",")]
                         if args.countries else get_country_ids_from_bundle(data_dict))
            years = list(range(args.year_start, args.year_end + 1))
            log.info(f"Countries ({len(countries)})  Years: {len(years)}")
            estimator = DynamicsEstimator()
            try:
                d_m_tensor = estimator.compute(data_dict)
                log.info(f"D_m tensor: {tuple(d_m_tensor.shape)}")
            except Exception as e:
                log.warning(f"DynamicsEstimator failed ({e}) - using zeros")
                d_m_tensor = torch.zeros(len(countries), 3)
            d_m_df = tensor_to_df(d_m_tensor, countries, col_prefix="dyn", years=years)
            os.makedirs(os.path.dirname(args.output) or ".", exist_ok=True)
            d_m_df.to_parquet(args.output, index=False, engine="pyarrow", compression="snappy")
            log.info(f"D_m saved -> {args.output}  shape={d_m_df.shape}")
            for iso in countries[:5]:
                row = d_m_df[d_m_df["country"] == iso].iloc[0]
                log.info(f"  {iso}: v={row['dyn_0']:.3f}  iota={row['dyn_1']:.3f}  rho={row['dyn_2']:.3f}")
            log.info("  D_m DONE")

        if __name__ == "__main__":
            main()
    args:
      - --bundle
      - {inputPath: bundle}
      - --countries
      - {inputValue: countries}
      - --year_start
      - {inputValue: year_start}
      - --year_end
      - {inputValue: year_end}
      - --output
      - {outputPath: d_m_data}
