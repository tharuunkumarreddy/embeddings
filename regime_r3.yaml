name: Regime R3 - Economic Coordination
description: Spectral graph embedding with supply, buyer, and rivalry structured sub-heads. embed_dim=32. REGIME_DIMS: [64, 96].

inputs:
  - name: regime_id
    type: String
    description: 'Regime identifier (r1..r9) used in metadata output'
    default: 'r3'
  - name: bundle
    type: String
    description: 'Path to bundle.pkl from Preprocessor component'
  - name: c_m_path
    type: String
    description: 'Path to c_m_bundle.parquet from C_m Loader (empty = no gating)'
    default: ''
  - name: countries
    type: String
    description: 'Comma-separated ISO3 country codes. Empty = auto-detect from bundle.'
    default: ''
  - name: year_start
    type: String
    description: 'Start year (inclusive)'
    default: '2010'
  - name: year_end
    type: String
    description: 'End year (inclusive)'
    default: '2025'

outputs:
  - name: embeddings
    type: Data
    description: 'Regime embeddings Parquet (country | year | isic_code | isic_level | dim_0..dim_31)'
  - name: meta
    type: Data
    description: 'Regime metadata JSON (embed_dim, regime_dims, output_shape, runtime_s)'

implementation:
  container:
    image: nikhilv215/nesy-factory:v23
    command:
      - python3
      - -u
      - -c
      - |
        import os, json, argparse, logging, pickle, time, abc
        import numpy as np
        import pandas as pd
        import torch
        import torch.nn as nn

        logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
        log = logging.getLogger("regime_r3")

        # -- Inline BaseRegimeModel ----------------------------------------------------

        class BaseRegimeModel(abc.ABC):
            @property
            @abc.abstractmethod
            def regime_name(self) -> str: ...
            @property
            @abc.abstractmethod
            def embed_dim(self) -> int: ...
            @abc.abstractmethod
            def fit(self, data_dict: dict) -> None: ...
            @abc.abstractmethod
            def embed(self, data_dict: dict) -> torch.Tensor: ...

            @staticmethod
            def to_tensor(arr):
                return torch.from_numpy(np.nan_to_num(arr, nan=0.0, posinf=1.0, neginf=0.0)).float()

            @staticmethod
            def guard_output(t, name):
                if torch.isnan(t).any() or torch.isinf(t).any():
                    log.warning(f"{name}: NaN/Inf in output - replacing with 0")
                    t = torch.nan_to_num(t, nan=0.0, posinf=1.0, neginf=0.0)
                return t

        # -- R3 Model: Graph Embedding + Sub-heads ------------------------------------

        EMBED_DIM  = 32
        HIDDEN_DIM = 64
        N_EPOCHS   = 150
        LR         = 1e-3

        # Sub-regime slice sizes (local dims within this 32-dim block)
        SUPPLY_DIM  = 11   # supply_dims  [0-11]  -> global [64-75]
        BUYER_DIM   = 10   # buyer_dims   [11-21] -> global [75-85]
        RIVALRY_DIM = 11   # rivalry_dims [21-32] -> global [85-96]

        # Node feature dim: Comtrade(4) + WITS_policy(4) + UNCTAD_FDI(4) + BIS_capital(3) + UNIDO_coord(3) = 18
        NODE_FEAT_DIM = 4 + 4 + 4 + 3 + 3
        SPECTRAL_K    = 4
        MLP_IN_DIM    = SPECTRAL_K + NODE_FEAT_DIM   # 22

        def spectral_embed(adj: np.ndarray, k: int) -> np.ndarray:
            adj = adj + adj.T
            np.fill_diagonal(adj, 0.0)
            D_inv_sqrt = np.diag(1.0 / (np.sqrt(adj.sum(axis=1)) + 1e-8))
            L_sym      = np.eye(len(adj)) - D_inv_sqrt @ adj @ D_inv_sqrt
            _, eigvecs = np.linalg.eigh(L_sym)
            return eigvecs[:, 1:k + 1].astype(np.float32)

        class EconCoordModel(nn.Module):
                Regime 3 - Economic Coordination | embed_dim=32
            REGIME_DIMS: coordination [64,96] | supply[64,75] | buyer[75,85] | rivalry[85,96]
            

            @property
            def regime_name(self): return "Economic Coordination"
            @property
            def embed_dim(self): return EMBED_DIM

            def __init__(self):
                self.model = None

            def _build_input(self, data_dict):
                comtrade   = data_dict["Comtrade"]
                adj        = comtrade["adjacency"]       # (N, N)
                node_feats = comtrade["node_features"]   # (N, 4)
                wits    = self.to_tensor(data_dict["WITS_policy"]).numpy()
                unctad  = self.to_tensor(data_dict["UNCTAD_FDI"]).numpy()
                bis_cap = self.to_tensor(data_dict["BIS_capital"]).numpy()
                unido   = self.to_tensor(data_dict["UNIDO_coord"]).numpy()
                pos_enc   = spectral_embed(adj, SPECTRAL_K)
                all_feats = np.concatenate(
                    [pos_enc, node_feats, wits, unctad, bis_cap, unido], axis=1
                ).astype(np.float32)
                return torch.from_numpy(all_feats), adj

            def fit(self, data_dict):
                x, adj = self._build_input(data_dict)
                adj_t  = torch.from_numpy((adj + adj.T).astype(np.float32))
                self.model = EconCoordModel(MLP_IN_DIM, HIDDEN_DIM, SUPPLY_DIM, BUYER_DIM, RIVALRY_DIM)
                opt = torch.optim.Adam(self.model.parameters(), lr=LR)
                self.model.train()
                for _ in range(N_EPOCHS):
                    opt.zero_grad()
                    _, h = self.model(x)
                    self.model.graph_recon_loss(h, adj_t).backward()
                    nn.utils.clip_grad_norm_(self.model.parameters(), 1.0)
                    opt.step()
                self.model.eval()

            def embed(self, data_dict):
                if self.model is None:
                    self.fit(data_dict)
                x, _ = self._build_input(data_dict)
                with torch.no_grad():
                    emb, _ = self.model(x)
                return self.guard_output(emb, self.regime_name)

        # -- Runner utilities (inlined) ------------------------------------------------

        def get_country_ids_from_bundle(data_dict):
            if "__countries__" in data_dict:
                return data_dict["__countries__"]
            for val in data_dict.values():
                if isinstance(val, np.ndarray) and val.ndim >= 1:
                    return [f"country_{i}" for i in range(val.shape[0])]
            return []

        def apply_cm_gating(emb_np, c_m_df):
            if c_m_df.empty:
                return pd.DataFrame()
            base    = emb_np[0]
            gates   = c_m_df["c_m_gate"].values.astype(np.float32)      if "c_m_gate"      in c_m_df.columns else np.full(len(c_m_df), 0.5, dtype=np.float32)
            weights = c_m_df["sector_weight"].values.astype(np.float32) if "sector_weight" in c_m_df.columns else np.ones(len(c_m_df),       dtype=np.float32)
            gated  = base[None, :] * (gates * weights)[:, None]
            result = pd.DataFrame(gated, columns=[f"dim_{i}" for i in range(len(base))])
            result.insert(0, "isic_code",  c_m_df["isic_code"].values  if "isic_code"  in c_m_df.columns else "")
            result.insert(1, "isic_level", c_m_df["isic_level"].values if "isic_level" in c_m_df.columns else "")
            return result

        def run_for_bundle(data_dict, model, c_m_df, countries, years):
            all_rows = []
            N = len(countries)
            log.info(f"  Fitting model: {model.regime_name}")
            model.fit(data_dict)
            base_np = model.embed(data_dict).detach().numpy()
            log.info(f"  Base embedding: {base_np.shape}")
            for ci, country in enumerate(countries):
                emb_c = base_np[[ci]]
                c_m_c = c_m_df[c_m_df["country"] == country] if "country" in c_m_df.columns else c_m_df
                for year in years:
                    c_m_yr = (c_m_c[c_m_c["year"] == year]
                              if "year" in c_m_df.columns and not c_m_c.empty else c_m_c)
                    if c_m_yr.empty:
                        all_rows.append({"country": country, "year": year,
                                         "isic_code": "ALL", "isic_level": "ALL",
                                         **{f"dim_{i}": float(emb_c[0, i])
                                            for i in range(emb_c.shape[1])}})
                        continue
                    gdf = apply_cm_gating(emb_c, c_m_yr)
                    if gdf.empty:
                        continue
                    gdf.insert(0, "year", year)
                    gdf.insert(0, "country", country)
                    all_rows.extend(gdf.to_dict("records"))
                if (ci + 1) % 20 == 0:
                    log.info(f"  {ci+1}/{N} countries ...")
            return pd.DataFrame(all_rows)

        # -- Main ---------------------------------------------------------------------

        def main():
            ap = argparse.ArgumentParser(description="Component: Regime Runner")
            ap.add_argument("--regime_id",  default="r3", help="Regime identifier")
            ap.add_argument("--bundle",     required=True)
            ap.add_argument("--c_m_path",   default="")
            ap.add_argument("--output",     required=True)
            ap.add_argument("--meta_path",  default="")
            ap.add_argument("--countries",  default="")
            ap.add_argument("--year_start", type=int, default=2010)
            ap.add_argument("--year_end",   type=int, default=2025)
            args = ap.parse_args()

            log.info("=" * 60)
            log.info(f"  Regime Runner  |  regime={args.regime_id}  (Economic Coordination)")
            log.info("=" * 60)

            with open(args.bundle, "rb") as f:
                data_dict = pickle.load(f)

            countries = ([c.strip() for c in args.countries.split(",")]
                         if args.countries else get_country_ids_from_bundle(data_dict))
            years = list(range(args.year_start, args.year_end + 1))

            c_m_df = pd.DataFrame()
            if args.c_m_path and os.path.exists(args.c_m_path):
                c_m_df = pd.read_parquet(args.c_m_path)
                log.info(f"C_m loaded: {c_m_df.shape}")

            model = EconomicCoordRegime()
            log.info(f"Running {model.regime_name}  embed_dim={model.embed_dim}  "
                     f"N={len(countries)}  T={len(years)}")

            t0 = time.time()
            result_df = run_for_bundle(data_dict, model, c_m_df, countries, years)
            elapsed = time.time() - t0

            os.makedirs(os.path.dirname(args.output) or ".", exist_ok=True)
            result_df.to_parquet(args.output, index=False, engine="pyarrow", compression="snappy")
            log.info(f"Saved -> {args.output}  shape={result_df.shape}  ({elapsed:.1f}s)")

            if args.meta_path:
                os.makedirs(os.path.dirname(args.meta_path) or ".", exist_ok=True)
                with open(args.meta_path, "w") as f:
                    json.dump({"regime_id": args.regime_id, "regime_name": model.regime_name,
                               "embed_dim": model.embed_dim, "regime_dims": [64, 96],
                               "sub_dims": {"supply": [64, 75], "buyer": [75, 85], "rivalry": [85, 96]},
                               "output_shape": list(result_df.shape),
                               "runtime_s": round(elapsed, 2)}, f, indent=2)

        if __name__ == "__main__":
            main()
    args:
      - --regime_id
      - {inputValue: regime_id}
      - --bundle
      - {inputValue: bundle}
      - --c_m_path
      - {inputValue: c_m_path}
      - --countries
      - {inputValue: countries}
      - --year_start
      - {inputValue: year_start}
      - --year_end
      - {inputValue: year_end}
      - --output
      - {outputPath: embeddings}
      - --meta_path
      - {outputPath: meta}
